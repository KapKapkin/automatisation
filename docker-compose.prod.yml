services:
  db:
    image: postgres:16
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
      - prod_backups:/backups
    environment:
      - POSTGRES_DB=university_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PROD_DB_PASSWORD:-postgres}
    restart: unless-stopped

  web:
    image: ${DOCKER_USERNAME}/automatisation-web:${DEPLOY_TAG:-prod}
    ports:
      - "8080:8000"
    depends_on:
      - db
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DATABASE_URL=postgres://postgres:${PROD_DB_PASSWORD:-postgres}@db:5432/university_db
      - POSTGRES_DB=university_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PROD_DB_PASSWORD:-postgres}
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --timeout 120 config.wsgi:application"
    restart: unless-stopped

volumes:
  prod_postgres_data:
  prod_backups:
